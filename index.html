<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>𓆩⍣⃝ 𝙉𝙊𝘾𝙏𝙍𝘼⍣⃝ 𓆪</title>

    <meta name="description"
          content="Descubre y comparte grupos de WhatsApp">

    <meta name="theme-color"
          content="#09090f">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<!-- =========================
     SPLASH
========================= -->

<div id="splash">

    <div class="logoSplash">

        <h1>𓆩⍣⃝ 𝙉𝙊𝘾𝙏𝙍𝘼⍣⃝ 𓆪</h1>

        <p>Descubre y comparte grupos de WhatsApp</p>

        <span class="creatorSplash">
            Desarrollado por Bennett
        </span>

    </div>

</div>

<!-- =========================
     APLICACIÓN
========================= -->

<div id="app">
    

<!-- =========================
     BARRA SUPERIOR
========================= -->

<header class="topbar">

    <div class="logo">

        <h2>𓆩⍣⃝ 𝙉𝙊𝘾𝙏𝙍𝘼⍣⃝ 𓆪</h2>

    </div>

    <div class="actions">

        <button id="notificationBtn" title="Notificaciones">

            <i class="fa-solid fa-bell"></i>

        </button>

        <button id="profileBtn" title="Perfil">

            <i class="fa-solid fa-user"></i>

        </button>

    </div>

</header>

<!-- =========================
     CONTENIDO PRINCIPAL
========================= -->

<main>

    <!-- HERO -->

    <section class="hero">

        <h1>Encuentra miles de grupos de WhatsApp</h1>

        <p>
            Descubre comunidades, comparte tus grupos y conoce personas con tus mismos intereses.
        </p>

        <div class="searchBox">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar grupos...">

        </div>

    </section>
